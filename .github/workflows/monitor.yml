name: MPSC Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      
      - name: Check files exist
        run: |
          echo "Current directory: $(pwd)"
          echo "Files:"
          ls -la
          echo "Checking monitor.py:"
          python -c "import os; print('EXISTS' if os.path.exists('monitor.py') else 'MISSING')"
      
      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python monitor.py || echo "Monitor completed with warnings"
      
      - name: Show state
        if: always()
        run: |
          echo "=== STATE FILE ==="
          cat monitor_state.json 2>/dev/null || echo "No state file yet"
          echo "=== DONE ==="
